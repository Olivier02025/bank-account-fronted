<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banque - Gestion de compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            padding-top: 50px;
            padding-bottom: 50px;
        }
        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
            text-align: center;
        }
        
        .card-header h3 {
            margin: 0;
            font-weight: 600;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .form-control, .btn {
            border-radius: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 20px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .balance-display {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .balance-amount {
            font-size: 2.5rem;
            font-weight: bold;
            color: #28a745;
        }
        
        .alert {
            border-radius: 10px;
            margin-top: 20px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
        }
        
        .icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Header -->
                <div class="text-center mb-4">
                    <h1 class="text-white">
                        <i class="fas fa-university"></i> Banque Digital
                    </h1>
                    <p class="text-white-50">Gérez vos comptes facilement</p>
                </div>
                
                <!-- Check Balance Card -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-search"></i> Consulter le solde</h3>
                    </div>
                    <div class="card-body">
                        <form id="balanceForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="balanceAccountNumber" class="form-label">
                                        <i class="fas fa-credit-card"></i> Numéro de compte
                                    </label>
                                    <input type="text" class="form-control" id="balanceAccountNumber" 
                                           placeholder="MG76823886788" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="balanceBankCode" class="form-label">
                                        <i class="fas fa-building"></i> Code banque
                                    </label>
                                    <input type="text" class="form-control" id="balanceBankCode" 
                                           placeholder="30006" required>
                                </div>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-eye"></i> Voir le solde
                                </button>
                            </div>
                        </form>
                        
                        <div id="balanceResult" class="balance-display" style="display: none;">
                            <h4><i class="fas fa-chart-line"></i> Solde actuel</h4>
                            <div class="balance-amount" id="balanceAmount">0 MGA</div>
                            <div id="balanceMessage"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Withdraw Card -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-money-bill-wave"></i> Effectuer un retrait</h3>
                    </div>
                    <div class="card-body">
                        <form id="withdrawForm">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="withdrawAccountNumber" class="form-label">
                                        <i class="fas fa-credit-card"></i> Numéro de compte
                                    </label>
                                    <input type="text" class="form-control" id="withdrawAccountNumber" 
                                           placeholder="MG76823886788" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="withdrawBankCode" class="form-label">
                                        <i class="fas fa-building"></i> Code banque
                                    </label>
                                    <input type="text" class="form-control" id="withdrawBankCode" 
                                           placeholder="30006" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="withdrawAmount" class="form-label">
                                        <i class="fas fa-coins"></i> Montant (MGA)
                                    </label>
                                    <input type="number" class="form-control" id="withdrawAmount" 
                                           placeholder="100" step="0.01" min="0.01" required>
                                </div>
                            </div>
                            <div class="text-center">
                                <button type="submit" class="btn btn-primary btn-lg">
                                    <i class="fas fa-arrow-down"></i> Effectuer le retrait
                                </button>
                            </div>
                        </form>
                        
                        <div id="withdrawResult" class="balance-display" style="display: none;">
                            <div id="withdrawMessage"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="loadingSpinner" class="loading">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/hide loading spinner
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'block';
        }
        
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
        }
        
        // Display alert messages
        function showAlert(message, type, containerId) {
            const container = document.getElementById(containerId);
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.role = 'alert';
            alertDiv.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.appendChild(alertDiv);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                if (alertDiv && alertDiv.remove) {
                    alertDiv.remove();
                }
            }, 5000);
        }
        
        // Check balance form submission
        document.getElementById('balanceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const accountNumber = document.getElementById('balanceAccountNumber').value;
            const bankCode = document.getElementById('balanceBankCode').value;
            
            showLoading();
            
            try {
                const formData = new FormData();
                formData.append('accountNumber', accountNumber);
                formData.append('bankCode', bankCode);
                
                const response = await fetch('/check-balance', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const balanceResult = document.getElementById('balanceResult');
                    const balanceAmount = document.getElementById('balanceAmount');
                    const balanceMessage = document.getElementById('balanceMessage');
                    
                    balanceAmount.textContent = `${data.balance.toLocaleString()} MGA`;
                    balanceMessage.textContent = data.message;
                    balanceResult.style.display = 'block';
                    
                    showAlert('Solde consulté avec succès!', 'success', 'balanceResult');
                } else {
                    showAlert(data.error || 'Erreur lors de la consultation', 'danger', 'balanceResult');
                }
            } catch (error) {
                showAlert('Erreur de connexion au serveur', 'danger', 'balanceResult');
            } finally {
                hideLoading();
            }
        });
        
        // Withdraw form submission
        document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const accountNumber = document.getElementById('withdrawAccountNumber').value;
            const bankCode = document.getElementById('withdrawBankCode').value;
            const amount = document.getElementById('withdrawAmount').value;
            
            showLoading();
            
            try {
                const formData = new FormData();
                formData.append('accountNumber', accountNumber);
                formData.append('bankCode', bankCode);
                formData.append('amount', amount);
                
                const response = await fetch('/withdraw', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const withdrawResult = document.getElementById('withdrawResult');
                    const withdrawMessage = document.getElementById('withdrawMessage');
                    
                    withdrawMessage.innerHTML = `
                        <h4><i class="fas fa-check-circle text-success"></i> ${data.message}</h4>
                        <p>Nouveau solde: <strong>${data.newBalance.toLocaleString()} MGA</strong></p>
                    `;
                    withdrawResult.style.display = 'block';
                    
                    showAlert('Retrait effectué avec succès!', 'success', 'withdrawResult');
                    
                    // Clear the form
                    document.getElementById('withdrawForm').reset();
                } else {
                    showAlert(data.error || 'Erreur lors du retrait', 'danger', 'withdrawResult');
                }
            } catch (error) {
                showAlert('Erreur de connexion au serveur', 'danger', 'withdrawResult');
            } finally {
                hideLoading();
            }
        });
    </script>
</body>
</html>
